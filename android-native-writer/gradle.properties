# DEX 병합(mergeExtDex) 등이 큰 힙을 씁니다. Android Studio: Settings > Build > Execution > Deployment > Gradle —
# "Gradle JDK"는 정상이어야 하고, 오래된 user gradle.properties가 org.gradle.jvmargs로 512m 등을 덮어쓰지 않는지 확인하세요.
org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=512m -XX:+UseG1GC -Dfile.encoding=UTF-8
kotlin.daemon.jvmargs=-Xmx2048m
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
