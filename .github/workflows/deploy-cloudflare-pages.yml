# Deploy: lint, typecheck, Next build + next-on-pages, wrangler pages deploy.
# Repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Repo secrets/variables: NEXT_PUBLIC_KAKAO_MAP_JS_KEY — 카카오맵 JS 키 (NEXT_PUBLIC_* 는 CI 빌드 시 인라인됨)

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js
        env:
          # Cloudflare Pages UI만 설정 시 CI 빌드에 키가 없어 dapi.kakao.com/sdk.js 가 401 을 반환할 수 있음.
          NEXT_PUBLIC_KAKAO_MAP_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_JS_KEY || vars.NEXT_PUBLIC_KAKAO_MAP_JS_KEY }}
        run: npm run build

      - name: Adapt for Cloudflare (next-on-pages)
        env:
          NEXT_PUBLIC_KAKAO_MAP_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_JS_KEY || vars.NEXT_PUBLIC_KAKAO_MAP_JS_KEY }}
        run: npx --yes @cloudflare/next-on-pages@1.13.16

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.78.0"
          command: pages deploy .vercel/output/static --project-name=pet-nfc-synctag