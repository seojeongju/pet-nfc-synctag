# Deploy: lint, typecheck, Next build + next-on-pages, wrangler pages deploy.
# Repo secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# Repo secrets/variables: NEXT_PUBLIC_KAKAO_MAP_JS_KEY — 카카오맵 JS 키 (NEXT_PUBLIC_* 는 CI 빌드 시 인라인됨)
# Repo variables (권장): NEXT_PUBLIC_NFC_NATIVE_HANDOFF_ENABLED, NEXT_PUBLIC_NFC_NATIVE_APP_STORE_URL, NEXT_PUBLIC_APP_URL
# Repo variables (선택): GOOGLE_SITE_VERIFICATION, NAVER_SITE_VERIFICATION
# Cloudflare Pages 대시보드(Production 런타임): NFC_NATIVE_HANDOFF_SECRET — GitHub에 넣지 말고 Pages 환경 변수(암호화)에만

name: Deploy Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build Next.js
        env:
          # Cloudflare Pages UI만 설정 시 CI 빌드에 키가 없어 dapi.kakao.com/sdk.js 가 401 을 반환할 수 있음.
          NEXT_PUBLIC_KAKAO_MAP_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_JS_KEY || vars.NEXT_PUBLIC_KAKAO_MAP_JS_KEY }}
          # 보호자 Web Push(VAPID 공개키). 미설정 시 빌드에 포함되지 않음 → 알림 구독 카드 숨김.
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
          # 앱(딥링크) 쓰기·원점 검사. CI/Vars 미설정이면 "false" (권한 UI 비활성, 동작과 일치)
          NEXT_PUBLIC_NFC_NATIVE_HANDOFF_ENABLED: ${{ vars.NEXT_PUBLIC_NFC_NATIVE_HANDOFF_ENABLED || 'false' }}
          NEXT_PUBLIC_NFC_NATIVE_APP_STORE_URL: ${{ vars.NEXT_PUBLIC_NFC_NATIVE_APP_STORE_URL || '' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || '' }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION || '' }}
          NAVER_SITE_VERIFICATION: ${{ vars.NAVER_SITE_VERIFICATION || '' }}
        run: npm run build

      - name: Adapt for Cloudflare (next-on-pages)
        env:
          NEXT_PUBLIC_KAKAO_MAP_JS_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_JS_KEY || vars.NEXT_PUBLIC_KAKAO_MAP_JS_KEY }}
          NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ vars.NEXT_PUBLIC_VAPID_PUBLIC_KEY || '' }}
          NEXT_PUBLIC_NFC_NATIVE_HANDOFF_ENABLED: ${{ vars.NEXT_PUBLIC_NFC_NATIVE_HANDOFF_ENABLED || 'false' }}
          NEXT_PUBLIC_NFC_NATIVE_APP_STORE_URL: ${{ vars.NEXT_PUBLIC_NFC_NATIVE_APP_STORE_URL || '' }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL || '' }}
          GOOGLE_SITE_VERIFICATION: ${{ vars.GOOGLE_SITE_VERIFICATION || '' }}
          NAVER_SITE_VERIFICATION: ${{ vars.NAVER_SITE_VERIFICATION || '' }}
        run: npx --yes @cloudflare/next-on-pages@1.13.16

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4.78.0"
          command: pages deploy .vercel/output/static --project-name=pet-nfc-synctag