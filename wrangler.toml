name = "pet-id-connect"
compatibility_date = "2024-03-30"
pages_build_output_dir = ".next"

[[d1_databases]]
binding = "DB"
database_name = "pet-id-db"
database_id = "YOUR_D1_DATABASE_ID" # TODO: User should update this after creating D1 via dashboard

[[r2_buckets]]
binding = "R2"
bucket_name = "pet-id-r2"
